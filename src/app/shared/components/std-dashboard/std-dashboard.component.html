<div class="row">
    <div class="col-md-5">
        <app-std-form
        (emitUpdatedStd)="getUpdatedStd($event)"
        [getEditStd]="editStd"
        (emitNewStd)="getNewStudent($event)"
        ></app-std-form>
    </div>
    <div class="col-md-7 mt-4 mt-md-0">
        <app-std-table
        (emitEditStd)="getEditStd($event)"
        (emitRemoveID)="getRemoveID($event)"
        [getStdData]="stdArr"
        ></app-std-table>
    </div>
</div>
